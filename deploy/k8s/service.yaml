apiVersion: v1
kind: Service
metadata:
  name: trunk-recorder-vtt-tcp
  namespace: sdr-trunk-vtt
  labels:
    app: trunk-recorder-vtt
spec:
  type: LoadBalancer
  selector:
    app: trunk-recorder-vtt
  ports:
    # Host port must not collide with open-webui (also :8080 via klipper-lb).
    - name: http
      port: 8088
      targetPort: http
      protocol: TCP
