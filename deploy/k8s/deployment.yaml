apiVersion: apps/v1
kind: Deployment
metadata:
  name: trunk-recorder-vtt
  namespace: sdr-trunk-vtt
  labels:
    app: trunk-recorder-vtt
spec:
  # Keep replicas: 1 for now; claim paths use FOR UPDATE SKIP LOCKED when you scale.
  replicas: 1
  selector:
    matchLabels:
      app: trunk-recorder-vtt
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: trunk-recorder-vtt
    spec:
      # Schedule on the node that has the image + working NFS client.
      nodeSelector:
        kubernetes.io/hostname: k3s-node1
      containers:
        - name: vtt
          image: trunk-recorder-vtt:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: sdr-trunk-vtt-env
          env:
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: sdr-trunk-vtt-secrets
                  key: API_KEY
            - name: WHISPER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sdr-trunk-vtt-secrets
                  key: WHISPER_API_KEY
                  optional: true
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sdr-trunk-vtt-secrets
                  key: DATABASE_URL
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /data
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: sdr-trunk-vtt-pvc
