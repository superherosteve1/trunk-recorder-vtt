# Do not commit a real secret. Create with:
#   ./deploy/k8s/create-secret.sh
# or:
#   kubectl -n sdr-trunk-vtt create secret generic sdr-trunk-vtt-secrets \
#     --from-literal=API_KEY='your-secret' \
#     --from-literal=WHISPER_API_KEY='' \
#     --from-literal=DATABASE_URL='postgresql://vtt:PASSWORD@192.168.1.162:2665/vtt'
#
# Leave DATABASE_URL empty to keep using SQLite at /data/calls.db.
apiVersion: v1
kind: Secret
metadata:
  name: sdr-trunk-vtt-secrets
  namespace: sdr-trunk-vtt
type: Opaque
stringData:
  API_KEY: change-me-before-apply
  WHISPER_API_KEY: ""
  DATABASE_URL: ""
